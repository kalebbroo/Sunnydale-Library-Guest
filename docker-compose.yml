services:
  web:
    image: sunnydalelibrary:latest
    build:
      context: .
      args:
        BUILD_CONFIGURATION: Development
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
    ports:
      - "8080:8080"
    volumes:
      - app_logs:/app/logs

volumes:
  app_logs:
