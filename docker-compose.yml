services:
  web:
    image: sunnydalelibrary:latest
    build:
      context: .
      args:
        BUILD_CONFIGURATION: Development
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
    ports:
      # UniFi's external portal redirect targets port 80 implicitly; container
      # still listens on 8080 internally, host-side just remaps to 80.
      - "80:8080"
    volumes:
      - app_logs:/app/logs

volumes:
  app_logs:
