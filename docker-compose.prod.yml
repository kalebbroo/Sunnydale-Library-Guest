services:
  web:
    image: sunnydalelibrary:latest
    build:
      context: .
      args:
        BUILD_CONFIGURATION: Release
    env_file:
      - .env.production
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
    ports:
      - "8080:8080"
    volumes:
      - app_logs:/app/logs
    restart: unless-stopped

volumes:
  app_logs:
