services:
  web:
    image: sunnydalelibrary:latest
    build:
      context: .
      args:
        BUILD_CONFIGURATION: Release
    env_file:
      - .env.production
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
    volumes:
      - app_logs:/app/logs
    restart: unless-stopped
    networks:
      - webnet

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARE_TUNNEL_TOKEN}"]
    env_file:
      - .env.production
    restart: unless-stopped
    depends_on:
      - web
    networks:
      - webnet

volumes:
  app_logs:

networks:
  webnet:
    driver: bridge
