services:
  web:
    image: sunnydalelibrary:latest
    build:
      context: .
      args:
        BUILD_CONFIGURATION: Release
    env_file:
      - .env.production
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
    ports:
      # UniFi's external portal redirect targets port 80 implicitly; container
      # still listens on 8080 internally, host-side just remaps to 80.
      - "80:8080"
    volumes:
      - app_logs:/app/logs
      - app_data:/app/data
    restart: unless-stopped

volumes:
  app_logs:
  app_data:
